services:
  salesapp:
    build: .
    container_name: salesapp
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@dbsales_high?TNS_ADMIN=/app/wallet
      SPRING_DATASOURCE_USERNAME: ${ORACLE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.OracleDialect
      IDP_ISSUER_URI: ${IDP_ISSUER_URI}
      SALESAPP_API_MANAGER_REQUIRED: ${SALESAPP_API_MANAGER_REQUIRED:-true}
      SALESAPP_API_MANAGER_SUBSCRIPTION_KEY: ${SALESAPP_API_MANAGER_SUBSCRIPTION_KEY}
      ORACLE_WALLET_BASE64: ${ORACLE_WALLET_BASE64}
    expose:
      - 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
